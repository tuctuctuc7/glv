<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GLV Meta Ads · Beta Access</title>
<style>
:root{color-scheme:light;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray400:#94a3b8;--gray600:#475569;--gray800:#1e293b;--gray900:#0f172a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:var(--gray800);display:grid;place-items:center;padding:20px;}
.access{width:min(100%,380px);background:#fff;border:1px solid var(--gray200);border-radius:12px;box-shadow:0 12px 32px rgba(15,23,42,.12);padding:24px;}
.brand{font-size:15px;font-weight:800;color:var(--gray900);margin-bottom:4px;}
.sub{font-size:13px;color:var(--gray600);margin-bottom:18px;}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray600);margin-bottom:7px;}
input{width:100%;height:42px;border:1px solid var(--gray200);border-radius:8px;padding:0 12px;font-size:15px;color:var(--gray900);outline:none;}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.14);}
button{width:100%;height:42px;margin-top:12px;border:0;border-radius:8px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
button:disabled{opacity:.65;cursor:wait;}
.msg{min-height:18px;margin-top:12px;font-size:13px;color:var(--red);}
.msg.ok{color:var(--green);}
</style>
</head>
<body>
<main class="access">
  <div class="brand">GELAVIS Meta Ads</div>
  <div class="sub">Beta access</div>
  <form id="access-form">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
    <button id="submit-btn" type="submit">Enter dashboard</button>
    <div class="msg" id="message"></div>
  </form>
</main>
<script>
const form=document.getElementById('access-form');
const input=document.getElementById('password');
const button=document.getElementById('submit-btn');
const message=document.getElementById('message');

function nextPath(){
  const params=new URLSearchParams(window.location.search);
  const next=params.get('next')||'/glv-meta-ads/';
  return (next.startsWith('/glv-meta-ads')||next.startsWith('/glv-mb-os'))?next:'/glv-meta-ads/';
}

form.addEventListener('submit',async event=>{
  event.preventDefault();
  message.textContent='';
  message.classList.remove('ok');
  button.disabled=true;
  try{
    const res=await fetch('/api/glv-meta-ads/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:input.value})
    });
    if(!res.ok){
      message.textContent='That password did not work.';
      button.disabled=false;
      input.select();
      return;
    }
    message.textContent='Access granted.';
    message.classList.add('ok');
    window.location.assign(nextPath());
  }catch(err){
    message.textContent='Could not check the password. Try again.';
    button.disabled=false;
  }
});
</script>
</body>
</html>
