<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenthic Lab</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --line: #d8dee8;
      --ink: #17202f;
      --muted: #637083;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 28px;
    }

    main {
      margin: 0 auto;
      max-width: 760px;
    }

    p,
    h1 {
      margin: 0;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      font-size: 34px;
      line-height: 1.1;
      margin-top: 6px;
    }

    .sub {
      color: var(--muted);
      margin-top: 10px;
    }

    .dashboards {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }

    a {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      display: flex;
      justify-content: space-between;
      padding: 16px;
      text-decoration: none;
    }

    a strong {
      font-size: 17px;
    }

    a span {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Agenthic Lab</p>
    <h1>Dashboards</h1>
    <p class="sub">Client performance workspaces.</p>

    <div class="dashboards">
      <a href="/glv/">
        <strong>GLV</strong>
        <span>Open dashboard</span>
      </a>
    </div>
  </main>
</body>
</html>
