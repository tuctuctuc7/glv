<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GELAVIS Media Buyer OS</title>
<style>
:root{
  color-scheme:dark;
  --shell:#090a0c;
  --shell-2:#111318;
  --panel:#f4f1ea;
  --panel-2:#ebe7de;
  --card:#fffdf8;
  --ink:#171717;
  --muted:#75716b;
  --line:rgba(28,28,28,.11);
  --line-dark:rgba(255,255,255,.12);
  --green:#668270;
  --green-2:#8fb19b;
  --amber:#f0b35f;
  --coral:#ff786d;
  --violet:#9b87f5;
  --cyan:#83d8d6;
  --shadow:0 26px 80px rgba(0,0,0,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 9% 11%,rgba(131,216,214,.16),transparent 31%),
    radial-gradient(circle at 82% 13%,rgba(155,135,245,.16),transparent 30%),
    linear-gradient(135deg,#060607 0%,#111114 48%,#191816 100%);
  color:#f5f2eb;
  font-size:13px;
  overflow:hidden;
}
button,input{font:inherit}
button{cursor:pointer}
.app-shell{
  height:100vh;
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  padding:18px;
  gap:16px;
}
.rail{
  border:1px solid var(--line-dark);
  background:rgba(244,241,234,.08);
  border-radius:28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 10px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}
.mark{
  width:42px;
  height:42px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:linear-gradient(145deg,#f5f1e8,#c9c2b5);
  color:#111;
  font-weight:950;
  letter-spacing:0;
  margin-bottom:22px;
}
.nav{
  display:grid;
  gap:10px;
  width:100%;
}
.nav-button{
  position:relative;
  width:100%;
  height:58px;
  border:0;
  border-radius:20px;
  background:transparent;
  color:#aaa39a;
  display:grid;
  place-items:center;
  transition:.2s ease;
}
.nav-button:hover,.nav-button.active{
  background:rgba(255,255,255,.12);
  color:#fffaf0;
}
.nav-button.active::before{
  content:"";
  position:absolute;
  left:7px;
  width:4px;
  height:22px;
  border-radius:99px;
  background:var(--cyan);
  box-shadow:0 0 22px rgba(131,216,214,.7);
}
.nav-icon{
  width:22px;
  height:22px;
  border:2px solid currentColor;
  border-radius:8px;
  position:relative;
}
.nav-icon.grid::before,.nav-icon.grid::after{
  content:"";
  position:absolute;
  background:currentColor;
}
.nav-icon.grid::before{width:2px;top:3px;bottom:3px;left:8px}
.nav-icon.grid::after{height:2px;left:3px;right:3px;top:8px}
.nav-icon.stack{border-radius:6px;border-top-width:6px}
.nav-icon.signal{border-radius:50%}
.nav-icon.signal::before{
  content:"";
  position:absolute;
  inset:5px;
  border-radius:50%;
  border:2px solid currentColor;
}
.nav-icon.market::before{
  content:"";
  position:absolute;
  left:4px;
  right:4px;
  bottom:4px;
  height:8px;
  border-top:2px solid currentColor;
  transform:skewY(-18deg);
}
.nav-icon.memo{
  border-radius:5px;
}
.nav-icon.memo::before,.nav-icon.memo::after{
  content:"";
  position:absolute;
  left:4px;
  right:4px;
  height:2px;
  background:currentColor;
}
.nav-icon.memo::before{top:6px}
.nav-icon.memo::after{top:12px}
.rail-foot{
  margin-top:auto;
  display:grid;
  gap:12px;
  width:100%;
}
.mini-button{
  width:100%;
  height:46px;
  border:0;
  border-radius:17px;
  color:#d9d2c7;
  background:rgba(255,255,255,.08);
}
.workspace{
  min-width:0;
  height:100%;
  border:1px solid rgba(255,255,255,.14);
  border-radius:32px;
  background:linear-gradient(145deg,rgba(244,241,234,.94),rgba(224,219,209,.92));
  color:var(--ink);
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}
.workspace::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(255,255,255,.34),transparent 28%,transparent 72%,rgba(255,255,255,.22)),
    repeating-linear-gradient(90deg,rgba(0,0,0,.018) 0 1px,transparent 1px 54px);
}
.topbar{
  position:relative;
  z-index:1;
  height:78px;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:18px;
  padding:18px 24px 12px;
}
.eyebrow{
  color:var(--muted);
  font-size:10px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.title-row{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
h1{
  font-size:25px;
  line-height:1;
  font-weight:850;
  letter-spacing:0;
}
.live-dot{
  width:9px;
  height:9px;
  border-radius:99px;
  background:var(--green-2);
  box-shadow:0 0 0 6px rgba(143,177,155,.16),0 0 24px rgba(102,130,112,.8);
}
.search{
  width:min(34vw,460px);
  height:46px;
  border:1px solid rgba(23,23,23,.08);
  border-radius:99px;
  background:#fffefa;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 8px 0 18px;
  box-shadow:0 12px 34px rgba(31,28,24,.08);
}
.search input{
  min-width:0;
  flex:1;
  border:0;
  outline:0;
  background:transparent;
  color:var(--ink);
}
.search input::placeholder{color:#9a958d}
.circle-button{
  width:36px;
  height:36px;
  border:0;
  border-radius:50%;
  background:#101115;
  color:#fffaf0;
  display:grid;
  place-items:center;
}
.lens{
  width:14px;
  height:14px;
  border:2px solid currentColor;
  border-radius:50%;
  position:relative;
}
.lens::after{
  content:"";
  width:7px;
  height:2px;
  background:currentColor;
  position:absolute;
  right:-5px;
  bottom:-3px;
  transform:rotate(45deg);
  border-radius:99px;
}
.content{
  position:relative;
  z-index:1;
  height:calc(100% - 78px);
  padding:0 24px 24px;
  overflow:hidden;
}
.view{
  display:none;
  height:100%;
  overflow:auto;
  padding-bottom:4px;
}
.view.active{display:block}
.view::-webkit-scrollbar{width:8px}
.view::-webkit-scrollbar-thumb{background:rgba(23,23,23,.16);border-radius:99px}
.cockpit-grid{
  display:grid;
  grid-template-columns:minmax(0,1.18fr) minmax(330px,.82fr);
  gap:16px;
  height:100%;
  min-height:0;
}
.left-stack,.right-stack{
  min-height:0;
  display:grid;
  gap:16px;
  align-content:start;
}
.left-stack{grid-template-rows:auto auto minmax(0,1fr)}
.bento{
  background:rgba(255,253,248,.78);
  border:1px solid rgba(23,23,23,.08);
  border-radius:24px;
  box-shadow:0 18px 54px rgba(53,47,39,.08);
  overflow:hidden;
}
.hero-card{
  min-height:220px;
  display:grid;
  grid-template-columns:1.05fr .95fr;
  background:
    radial-gradient(circle at 86% 8%,rgba(131,216,214,.32),transparent 26%),
    radial-gradient(circle at 68% 90%,rgba(255,120,109,.18),transparent 32%),
    linear-gradient(145deg,#111216,#22252b);
  color:#fffaf0;
  padding:24px;
}
.hero-copy{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:18px;
}
.status-strip{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.chip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:25px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:99px;
  padding:5px 10px;
  background:rgba(255,255,255,.08);
  color:#ece7db;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.chip.light{
  background:rgba(23,23,23,.06);
  border-color:rgba(23,23,23,.08);
  color:#5f5a52;
}
.chip.good{background:rgba(102,130,112,.18);color:#e7f5e9}
.chip.warn{background:rgba(240,179,95,.18);color:#fff2d7}
.chip.bad{background:rgba(255,120,109,.18);color:#ffe4e0}
.hero-card h2{
  font-size:40px;
  max-width:620px;
  line-height:.98;
  letter-spacing:0;
  font-weight:900;
}
.hero-card p{
  max-width:560px;
  color:#c8c1b8;
  line-height:1.5;
  font-size:13px;
}
.orb-wrap{
  display:grid;
  place-items:center;
}
.orb{
  width:210px;
  height:210px;
  border-radius:50%;
  position:relative;
  display:grid;
  place-items:center;
  background:
    conic-gradient(from 230deg,var(--cyan),var(--green-2),var(--amber),var(--coral),var(--violet),var(--cyan));
  box-shadow:0 0 60px rgba(131,216,214,.22);
}
.orb::before{
  content:"";
  position:absolute;
  inset:12px;
  border-radius:50%;
  background:radial-gradient(circle at 32% 24%,#4f535e,#111216 62%);
}
.orb::after{
  content:"";
  position:absolute;
  inset:28px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:inset 0 0 30px rgba(255,255,255,.08);
}
.orb-score{
  position:relative;
  z-index:1;
  text-align:center;
}
.orb-score strong{
  display:block;
  font-size:58px;
  line-height:.9;
  font-weight:950;
}
.orb-score span{
  color:#c8c1b8;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:900;
}
.kpi-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}
.kpi{
  min-height:112px;
  padding:17px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.kpi-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.kpi-label{
  color:#777168;
  font-size:11px;
  font-weight:800;
}
.kpi-value{
  font-size:27px;
  line-height:1;
  font-weight:920;
  margin-top:8px;
}
.kpi-sub{
  color:#837d73;
  font-size:11px;
  line-height:1.35;
}
.spark{
  width:56px;
  height:28px;
}
.move-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
.move-card{
  min-height:190px;
  padding:18px;
  position:relative;
}
.move-card::before{
  content:"";
  position:absolute;
  inset:0 0 auto;
  height:4px;
  background:linear-gradient(90deg,var(--cyan),var(--amber),var(--coral));
  opacity:.82;
}
.rank{
  width:34px;
  height:34px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#111216;
  color:#fffaf0;
  font-weight:950;
  margin-bottom:14px;
}
.move-title{
  font-size:16px;
  line-height:1.15;
  font-weight:900;
  margin-bottom:10px;
}
.move-meta{
  color:#6f6960;
  line-height:1.45;
  font-size:12px;
}
.move-impact{
  margin-top:12px;
  color:#221f1c;
  font-size:12px;
  font-weight:850;
}
.panel-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  padding:17px 18px 0;
}
.section-title{
  color:#22201d;
  font-size:16px;
  line-height:1.1;
  font-weight:900;
}
.section-note{
  color:#7c756c;
  margin-top:4px;
  font-size:11px;
}
.action-board{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
.board-col{
  border-radius:20px;
  background:rgba(235,231,222,.72);
  border:1px solid rgba(23,23,23,.07);
  padding:12px;
  min-height:230px;
}
.col-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:#625c54;
  font-size:10px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.count{
  min-width:24px;
  height:24px;
  border-radius:99px;
  background:#fffdf8;
  display:grid;
  place-items:center;
  color:#292621;
}
.task{
  background:#fffdf8;
  border:1px solid rgba(23,23,23,.06);
  border-radius:16px;
  padding:13px;
  box-shadow:0 12px 28px rgba(47,43,36,.06);
}
.task+.task{margin-top:10px}
.task-title{
  font-size:13px;
  line-height:1.25;
  font-weight:900;
}
.task-meta{
  margin-top:8px;
  color:#756f66;
  font-size:11px;
  line-height:1.35;
}
.task-foot{
  margin-top:12px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.mini-chip{
  border-radius:99px;
  background:#f0ece3;
  color:#625b52;
  padding:5px 8px;
  font-size:10px;
  font-weight:900;
}
.mini-chip.good{background:rgba(102,130,112,.14);color:#496153}
.mini-chip.warn{background:rgba(240,179,95,.18);color:#835b1f}
.mini-chip.bad{background:rgba(255,120,109,.16);color:#8f332c}
.command-grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:12px;
  margin-top:16px;
}
.command-card{
  border-radius:20px;
  background:rgba(255,253,248,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:14px;
}
.command-label{
  color:#aaa398;
  font-size:10px;
  font-weight:950;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.command-value{
  color:#fffaf0;
  font-size:17px;
  font-weight:920;
  line-height:1.16;
  margin-top:8px;
}
.command-meta{
  color:#bfb7ad;
  font-size:11px;
  line-height:1.4;
  margin-top:8px;
}
.readiness{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.readiness-item{
  min-height:84px;
  border-radius:18px;
  background:rgba(255,253,248,.1);
  border:1px solid rgba(255,255,255,.11);
  padding:12px;
}
.readiness-item strong{
  display:block;
  font-size:21px;
  line-height:1;
  margin-top:7px;
}
.readiness-item span{
  color:#c8c1b8;
  font-size:10px;
  font-weight:850;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.side-card{
  padding:18px;
}
.market-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:center;
}
.market-card+.market-card{margin-top:12px}
.market-title{
  color:#747067;
  font-size:10px;
  font-weight:950;
  letter-spacing:.09em;
  text-transform:uppercase;
}
.market-value{
  font-size:28px;
  line-height:1;
  margin-top:7px;
  font-weight:930;
}
.market-sub{
  margin-top:7px;
  color:#7e776d;
  font-size:11px;
  line-height:1.35;
}
.gauge{
  width:96px;
  height:96px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:conic-gradient(var(--green) calc(var(--score,50)*1%),rgba(23,23,23,.08) 0);
  position:relative;
}
.gauge::before{
  content:"";
  position:absolute;
  inset:10px;
  background:#fffdf8;
  border-radius:50%;
}
.gauge strong{
  position:relative;
  font-size:21px;
  font-weight:950;
}
.radar-list{padding:14px 18px 18px}
.radar-item{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  padding:11px 0;
  border-top:1px solid rgba(23,23,23,.07);
}
.radar-item:first-child{border-top:0}
.pulse{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 5px rgba(102,130,112,.12);
}
.pulse.warn{background:var(--amber);box-shadow:0 0 0 5px rgba(240,179,95,.16)}
.pulse.bad{background:var(--coral);box-shadow:0 0 0 5px rgba(255,120,109,.16)}
.radar-name{
  font-size:12px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.radar-meta{
  color:#80786e;
  font-size:10px;
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.mono-stat{
  color:#27231f;
  font-size:11px;
  font-weight:900;
}
.decision-stack{
  padding:14px 18px 18px;
  display:grid;
  gap:10px;
}
.decision-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:11px;
  align-items:center;
  border-top:1px solid rgba(23,23,23,.07);
  padding-top:11px;
}
.decision-row:first-child{
  border-top:0;
  padding-top:0;
}
.decision-num{
  width:30px;
  height:30px;
  border-radius:11px;
  display:grid;
  place-items:center;
  background:#141519;
  color:#fffaf0;
  font-weight:950;
}
.decision-main{
  min-width:0;
}
.decision-title{
  font-size:12px;
  font-weight:920;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.decision-sub{
  margin-top:3px;
  color:#7d756c;
  font-size:10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.delta-chip{
  display:inline-flex;
  align-items:center;
  border-radius:99px;
  padding:5px 8px;
  font-size:10px;
  font-weight:950;
  background:#f0ece3;
  color:#5d574f;
}
.delta-chip.good{background:rgba(102,130,112,.14);color:#496153}
.delta-chip.warn{background:rgba(240,179,95,.18);color:#835b1f}
.delta-chip.bad{background:rgba(255,120,109,.16);color:#8f332c}
.matrix{
  padding:16px 18px 18px;
  display:grid;
  gap:10px;
}
.matrix-row{
  display:grid;
  grid-template-columns:92px 1fr auto;
  gap:10px;
  align-items:center;
}
.track{
  height:9px;
  border-radius:999px;
  background:rgba(23,23,23,.08);
  overflow:hidden;
}
.track span{
  display:block;
  height:100%;
  width:var(--w,0%);
  border-radius:inherit;
  background:linear-gradient(90deg,var(--green-2),var(--cyan));
}
.track.warn span{background:linear-gradient(90deg,var(--amber),var(--coral))}
.matrix-label{
  color:#70695f;
  font-size:10px;
  font-weight:950;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.matrix-value{
  color:#292520;
  font-size:11px;
  font-weight:950;
}
.memo-card{
  min-height:170px;
  padding:18px;
  color:#f3eee4;
  background:
    linear-gradient(145deg,rgba(11,12,15,.96),rgba(31,32,37,.95)),
    #111;
}
.memo-card .section-title{color:#fff7ed}
.memo-card .section-note{color:#b7aea2}
.memo-text{
  margin-top:14px;
  color:#d9d1c5;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:11px;
  line-height:1.6;
  white-space:pre-wrap;
}
.page-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.wide{grid-column:span 2}
.full{grid-column:1/-1}
.table-card{padding:16px}
.data-row{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) repeat(4,minmax(84px,.35fr));
  gap:10px;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(23,23,23,.07);
}
.data-row:first-of-type{border-top:0}
.data-head{
  color:#898278;
  font-size:10px;
  font-weight:950;

</head>
<body>
<div class="app-shell">
  <aside class="rail" aria-label="Media Buyer OS navigation">
    <div class="mark">MB</div>
    <nav class="nav">
      <button class="nav-button active" data-view="cockpit" title="Cockpit"><span class="nav-icon grid"></span></button>
      <button class="nav-button" data-view="actions" title="Actions"><span class="nav-icon stack"></span></button>
      <button class="nav-button" data-view="signals" title="Signals"><span class="nav-icon signal"></span></button>
      <button class="nav-button" data-view="markets" title="Markets"><span class="nav-icon market"></span></button>
      <button class="nav-button" data-view="memo" title="Memo"><span class="nav-icon memo"></span></button>
    </nav>
    <div class="rail-foot">
      <button class="mini-button" id="refresh-button" title="Refresh">R</button>
    </div>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <div>
        <div class="eyebrow">GELAVIS / Media Buyer OS</div>
        <div class="title-row"><h1 id="view-title">Decision Cockpit</h1><span class="live-dot"></span></div>
      </div>
      <label class="search">
        <input id="search-input" placeholder="Search campaigns, actions, signals">
        <button class="circle-button" type="button" title="Search"><span class="lens"></span></button>
      </label>
    </header>
    <main class="content" id="app">
      <div class="status"><div><div class="loader"></div><strong>Loading decision intelligence...</strong></div></div>
    </main>
  </section>
</div>

<script>
let report=null;
let activeView='cockpit';
let query='';

const app=document.getElementById('app');
const viewTitle=document.getElementById('view-title');
const searchInput=document.getElementById('search-input');
const navButtons=[...document.querySelectorAll('.nav-button')];
const refreshButton=document.getElementById('refresh-button');

const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const num=value=>Number(value||0);
const czk=value=>num(value)<=0?'CZK 0':'CZK '+Math.round(num(value)).toLocaleString('en-US');
const roas=value=>num(value)<=0?'0.00x':num(value).toFixed(2)+'x';
const short=(value,max=58)=>{const s=String(value||'Unnamed');return s.length>max?s.slice(0,max-1)+'...':s};
const pct=value=>Math.max(0,Math.min(100,Math.round(num(value)*100)));
const normalized=value=>String(value||'').toLowerCase();
const matches=item=>!query||normalized(JSON.stringify(item)).includes(query);
const pillClass=verdict=>verdict==='status_quo'?'good':verdict==='revamp'?'bad':'warn';
const averageDaily=totals=>num(totals?.spend)/Math.max(1,num(totals?.rows)||1);

function signedPct(value,invert=false){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return 'n/a';
  const n=num(value);
  const sign=n>0?'+':'';
  return `${sign}${Math.round(n*100)}%`;
}

function deltaClass(value,{goodUp=true,neutral=.06}={}){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return 'warn';
  const n=num(value);
  if(Math.abs(n)<neutral)return 'warn';
  const good=goodUp?n>0:n<0;
  return good?'good':'bad';
}

function deltaChip(label,value,opts){
  return `<span class="delta-chip ${deltaClass(value,opts)}">${esc(label)} ${esc(signedPct(value))}</span>`;
}

function marketMode(read){
  const status=String(read?.status||'unknown').replace(/_/g,' ');
  if(status==='scale carefully')return 'Scale carefully';
  if(status==='pmf signal')return 'PMF signal';
  if(status==='performance review')return 'Performance review';
  if(status==='hold monitor')return 'Hold and monitor';
  if(status==='protect')return 'Protect';
  return status.replace(/\b\w/g,ch=>ch.toUpperCase());
}

function scoreFromRead(read,market){
  const roas=num(read?.last_7d?.roas||read?.yesterday?.roas);
  const purchases=num(read?.last_7d?.purchases||read?.yesterday?.purchases);
  const base=market==='us'?roas*48+purchases*.7:roas*30+purchases*.05;
  return Math.max(8,Math.min(99,Math.round(base)));
}

function topAction(){
  const action=(report?.action_queue||[])[0];
  if(!action)return {title:'No urgent action',meta:'Monitor one more day before touching structure.',priority:'watch'};
  const entity=action.entity||{};
  return {
    title:action.recommendation||action.type||'Review account',
    meta:[action.market?.toUpperCase(),entity.name?short(entity.name,58):'',action.reason||''].filter(Boolean).join(' / '),
    priority:action.priority||'medium'
  };
}

function readinessMetrics(){
  const cz=report.market_reads?.czsk||{};
  const us=report.market_reads?.us||{};
  const high=(report.action_queue||[]).filter(action=>action.priority==='high').length;
  const waste=(report.zero_revenue_spend_pockets?.czsk?.ads||[]).slice(0,3).reduce((sum,item)=>sum+num(item.spend),0);
  const concentration=num(report.spend_concentration?.czsk?.top_3_spend_share);
  return [
    {label:'CZSK mode',value:marketMode(cz),tone:cz.status==='scale_carefully'?'good':'warn'},
    {label:'US mode',value:marketMode(us),tone:us.status==='pmf_signal'?'warn':'good'},
    {label:'Priority load',value:String(high),tone:high>2?'bad':high?'warn':'good'},
    {label:'Waste top 3',value:czk(waste),tone:waste>5000?'bad':waste>0?'warn':'good'},
    {label:'Spend concentration',value:concentration?`${Math.round(concentration*100)}%`:'n/a',tone:concentration>.75?'warn':'good'},
    {label:'Radar items',value:String((report.outlier_radar||[]).length+(report.fatigue_radar||[]).length),tone:'warn'}
  ];
}

function sparkline(points,color='var(--green)'){
  const vals=points.map(num);
  const max=Math.max(...vals,1);
  const path=vals.map((value,index)=>{
    const x=index*(56/Math.max(vals.length-1,1));
    const y=26-(value/max)*22;
    return `${index?'L':'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="spark" viewBox="0 0 56 28" aria-hidden="true"><path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"/><path d="${path} L56 28 L0 28 Z" fill="${color}" opacity=".08"/></svg>`;
}

function actionSource(type){
  return (report?.action_queue||[]).find(action=>action.type===type);
}

function topMoves(){
  const moves=[];
  const scale=actionSource('budget_increase_review');
  if(scale?.entity){
    moves.push({
      title:'Scale proven CZSK demand',
      time:'15 min',
      change:`Review ${short(scale.entity.name,48)} for the standard +20% increase.`,
      why:`${czk(scale.entity.spend)} spend, ${czk(scale.entity.revenue)} revenue, ${roas(scale.entity.roas)} ROAS.`,
      impact:'Uncaps the winner without turning the account into a rebuild.'
    });
  }
  const zero=(report?.zero_revenue_spend_pockets?.czsk?.ads||[]).slice(0,3);
  if(zero.length){
    const wasted=zero.reduce((sum,item)=>sum+num(item.spend),0);
    moves.push({
      title:'Stop silent budget leaks',
      time:'25 min',
      change:zero.map(item=>short(item.name,34)).join(' / '),
      why:`Top zero-revenue pockets have ${czk(wasted)} spend and no attributed revenue.`,
      impact:'Frees capacity before scaling the account harder.'
    });
  }
  const hurt=(report?.outlier_radar||[]).find(item=>item.classification==='hurt');
  if(hurt){
    moves.push({
      title:'Inspect the harmful shift',
      time:'20 min',
      change:`Open ${short(hurt.name,48)} and check what changed.`,
      why:(hurt.reasons||[]).join(' ')||'The entity moved against the desired account direction.',
      impact:'Prevents weak movement from hiding inside a healthy account read.'
    });
  }
  while(moves.length<3){
    moves.push({
      title:'Hold non-critical edits',
      time:'10 min',
      change:'Skip low-impact account touching today.',
      why:'Capacity is limited and the current verdict is optimize.',
      impact:'Keeps tomorrow signal cleaner.'
    });
  }
  return moves.slice(0,3);
}

function actionStage(action){
  if(action.priority==='high')return'Now';
  if(action.priority==='medium')return'Queue';
  return'Watch';
}

function buildActions(){
  const actions=(report?.action_queue||[]).filter(matches);
  const cols={Now:[],Queue:[],Watch:[]};
  actions.forEach(action=>cols[actionStage(action)].push(action));
  return cols;
}

function taskCard(action){
  const entity=action.entity||{};
  return `<article class="task">
    <div class="task-title">${esc(action.recommendation||action.type||'Review')}</div>
    <div class="task-meta">${entity.name?esc(short(entity.name,74))+'<br>':''}${esc(action.market||'market')} / ${esc(action.type||'signal')}</div>
    <div class="task-foot">
      <span class="mini-chip">${esc(action.priority||'medium')}</span>
      ${entity.roas!==undefined?`<span class="mini-chip">${roas(entity.roas)}</span>`:''}
      ${entity.spend!==undefined?`<span class="mini-chip">${czk(entity.spend)}</span>`:''}
    </div>
  </article>`;
}

function entityRow(item){
  return `<div class="data-row">
    <div class="entity-name">${esc(short(item.name,78))}</div>
    <div class="cell">${czk(item.spend)}</div>
    <div class="cell">${czk(item.revenue)}</div>
    <div class="cell">${roas(item.roas)}</div>
    <div class="cell">${Number(num(item.purchases)).toLocaleString('en-US')}</div>
  </div>`;
}

function radarItem(item){
  const bad=item.classification==='hurt'||num(item.roas)<1;
  const warn=item.classification==='watch'||num(item.roas)<1.3;
  const reasons=(item.reasons||[]).join(' ');
  return `<div class="radar-item">
    <span class="pulse ${bad?'bad':warn?'warn':''}"></span>
    <div>
      <div class="radar-name">${esc(short(item.name,62))}</div>
      <div class="radar-meta">${esc(reasons||item.classification||'signal')}</div>
    </div>
    <div class="mono-stat">${roas(item.roas)}</div>
  </div>`;
}

function marketCard(label,data,score){
  return `<div class="bento side-card market-card">
    <div>
      <div class="market-title">${esc(label)}</div>
      <div class="market-value">${roas(data.roas)}</div>
      <div class="market-sub">${czk(data.spend)} spend<br>${czk(data.revenue)} revenue / ${Number(num(data.purchases)).toLocaleString('en-US')} purchases</div>
    </div>
    <div class="gauge" style="--score:${score}"><strong>${score}</strong></div>
  </div>`;
}

function actionBoard(){
  const cols=buildActions();
  return `<section class="bento full">
    <div class="panel-head">
      <div><div class="section-title">Action Board</div><div class="section-note">Kanban view for today's media buying capacity.</div></div>
      <span class="chip light">${Object.values(cols).flat().length} items</span>
    </div>
    <div class="action-board">
      ${Object.entries(cols).map(([title,items])=>`<div class="board-col"><div class="col-title">${esc(title)}<span class="count">${items.length}</span></div>${items.slice(0,6).map(taskCard).join('')||'<div class="empty">No cards here.</div>'}</div>`).join('')}
    </div>
  </section>`;
}

function decisionStack(){
  const actions=(report?.action_queue||[]).filter(matches).slice(0,5);
  return `<section class="bento">
    <div class="panel-head">
      <div><div class="section-title">Today Command Stack</div><div class="section-note">Ranked by capacity and likely business impact.</div></div>
      <span class="chip light">${actions.length} active</span>
    </div>
    <div class="decision-stack">
      ${actions.map((action,index)=>{
        const entity=action.entity||{};
        return `<div class="decision-row">
          <div class="decision-num">${index+1}</div>
          <div class="decision-main">
            <div class="decision-title">${esc(action.recommendation||action.type||'Review')}</div>
            <div class="decision-sub">${esc([action.market?.toUpperCase(),entity.name?short(entity.name,76):'',action.reason].filter(Boolean).join(' / '))}</div>
          </div>
          <span class="mini-chip ${action.priority==='high'?'bad':action.priority==='medium'?'warn':'good'}">${esc(action.priority||'watch')}</span>
        </div>`;
      }).join('')||'<div class="empty">No active commands.</div>'}
    </div>
  </section>`;
}

function readinessPanel(){
  return `<section class="bento">
    <div class="panel-head">
      <div><div class="section-title">Operating State</div><div class="section-note">One-screen account posture.</div></div>
    </div>
    <div class="matrix">
      ${readinessMetrics().map(item=>`<div class="matrix-row">
        <div class="matrix-label">${esc(item.label)}</div>
        <div class="track ${item.tone==='bad'||item.tone==='warn'?'warn':''}"><span style="--w:${item.tone==='good'?88:item.tone==='warn'?58:34}%"></span></div>
        <div class="matrix-value">${esc(item.value)}</div>
      </div>`).join('')}
    </div>
  </section>`;
}

function concentrationPanel(market='czsk'){
  const data=report.spend_concentration?.[market]||{};
  const share=num(data.top_3_spend_share);
  const top=data.top||[];
  return `<section class="bento">
    <div class="panel-head">
      <div><div class="section-title">${esc(market.toUpperCase())} Spend Concentration</div><div class="section-note">Where budget dependency lives.</div></div>
      <span class="delta-chip ${share>.75?'warn':'good'}">${share?Math.round(share*100):0}% top 3</span>
    </div>
    <div class="radar-list">
      ${top.slice(0,3).map(item=>`<div class="radar-item">
        <span class="pulse ${num(item.roas)<1?'bad':num(item.roas)<1.7?'warn':''}"></span>
        <div><div class="radar-name">${esc(short(item.name,64))}</div><div class="radar-meta">${esc(czk(item.spend))} spend share ${Math.round(num(item.spend_share)*100)}%</div></div>
        <div class="mono-stat">${roas(item.roas)}</div>
      </div>`).join('')||'<div class="empty">No concentration data.</div>'}
    </div>
  </section>`;
}

function exceptionPanel(){
  const exceptions=[...(report.strong_signal_exceptions?.czsk||[]),...(report.strong_signal_exceptions?.us||[])].filter(matches);
  return `<section class="bento">
    <div class="panel-head">
      <div><div class="section-title">Judgement Lane</div><div class="section-note">Weak ROAS, but signal says do not blindly kill.</div></div>
      <span class="chip light">${exceptions.length}</span>
    </div>
    <div class="radar-list">
      ${exceptions.slice(0,5).map(item=>`<div class="radar-item">
        <span class="pulse warn"></span>
        <div><div class="radar-name">${esc(short(item.name,64))}</div><div class="radar-meta">${esc(item.reason||'strong signal exception')}</div></div>
        <div class="mono-stat">${roas(item.roas)}</div>
      </div>`).join('')||'<div class="empty">No judgement exceptions.</div>'}
    </div>
  </section>`;
}

function marketConsole(){
  const cz=report.market_reads?.czsk||{};
  const us=report.market_reads?.us||{};
  const czY=cz.yesterday||{};
  const us7=us.last_7d||{};
  return `<section class="bento full">
    <div class="panel-head">
      <div><div class="section-title">Market Console</div><div class="section-note">CZSK is the performance lane; US remains PMF unless breakeven repeats.</div></div>
    </div>
    <div class="market-console">
      <div class="console-tile"><div class="console-label">CZSK ROAS</div><div class="console-value">${roas(czY.roas)}</div><div class="console-sub">${deltaChip('ROAS vs 2d',cz.roas_delta_vs_prior_2_day_avg,{goodUp:true})}</div></div>
      <div class="console-tile"><div class="console-label">CZSK spend</div><div class="console-value">${czk(czY.spend)}</div><div class="console-sub">${deltaChip('Spend vs 2d',cz.spend_delta_vs_prior_2_day_avg,{goodUp:true})}</div></div>
      <div class="console-tile"><div class="console-label">US ROAS 7d</div><div class="console-value">${roas(us7.roas)}</div><div class="console-sub">${esc(marketMode(us))}</div></div>
      <div class="console-tile"><div class="console-label">US signal</div><div class="console-value">${Number(num(us7.purchases)).toLocaleString('en-US')} / ${Number(num(us7.checkouts)).toLocaleString('en-US')}</div><div class="console-sub">purchases / checkouts</div></div>
    </div>
    <div class="mode-band">
      <div class="mode-item"><div class="mode-label">Triage</div><div class="mode-value">${esc((report.capacity?.verdict||'unknown').replace(/_/g,' '))}</div></div>
      <div class="mode-item"><div class="mode-label">Momentum</div><div class="mode-value">${esc((cz.reasons||[])[0]||'Waiting for stronger signal')}</div></div>
      <div class="mode-item"><div class="mode-label">Shift</div><div class="mode-value">${esc((report.outlier_radar||[]).find(item=>item.classification==='hurt')?.name||'No critical harmful shift')}</div></div>
      <div class="mode-item"><div class="mode-label">Fatigue</div><div class="mode-value">${esc((report.fatigue_radar||[])[0]?.name||'No active fatigue cluster')}</div></div>
    </div>
  </section>`;
}

function renderCockpit(){
  const cap=report.capacity||{};
  const command=topAction();
  const czY=report.market_reads?.czsk?.yesterday||{};
  const us7=report.market_reads?.us?.last_7d||{};
  const actions=report.action_queue||[];
  const high=actions.filter(action=>action.priority==='high').length;
  const risk=(report.outlier_radar||[]).filter(item=>item.classification==='hurt').length+(report.fatigue_radar||[]).length;
  const score=Math.max(36,Math.min(92,Math.round((num(czY.roas)*22)+(high?8:0)-risk*4)));
  const moves=topMoves();
  const spendSeries=[.52,.64,.58,.74,.69,.82,1].map(v=>num(czY.spend)*v);
  const revSeries=[.48,.6,.73,.68,.86,.91,1].map(v=>num(czY.revenue)*v);
  return `<div class="view active" data-panel="cockpit">
    <div class="cockpit-grid">
      <div class="left-stack">
        <section class="bento hero-card">
          <div class="hero-copy">
            <div class="status-strip">
              <span class="chip ${pillClass(cap.verdict)}">${esc(cap.verdict||'unknown')}</span>
              <span class="chip">Live report</span>
              <span class="chip">${esc(report.report_date||'today')}</span>
            </div>
            <div>
              <h2>${esc(command.title)}</h2>
              <p>${esc(command.meta||cap.reason||'The decision engine is ready. Prioritize scale, waste, and harmful shifts.')}</p>
              <div class="command-grid">
                <div class="command-card">
                  <div class="command-label">Why this matters</div>
                  <div class="command-value">${esc(cap.reason||'Clear optimization work exists without needing a full rebuild.')}</div>
                  <div class="command-meta">${esc((report.market_reads?.czsk?.reasons||[]).join(' ')||'CZSK is the performance lane.')}</div>
                </div>
                <div class="readiness">
                  ${readinessMetrics().slice(0,3).map(item=>`<div class="readiness-item"><span>${esc(item.label)}</span><strong>${esc(item.value)}</strong></div>`).join('')}
                </div>
              </div>
            </div>
          </div>
          <div class="orb-wrap"><div class="orb"><div class="orb-score"><strong>${score}</strong><span>readiness</span></div></div></div>
        </section>
        <section class="kpi-row">
          <div class="bento kpi"><div class="kpi-top"><div><div class="kpi-label">CZSK yesterday</div><div class="kpi-value">${roas(czY.roas)}</div></div>${sparkline(revSeries,'var(--green)')}</div><div class="kpi-sub">${czk(czY.spend)} spend / ${czk(czY.revenue)} revenue<br>${deltaChip('ROAS',report.market_reads?.czsk?.roas_delta_vs_prior_2_day_avg,{goodUp:true})}</div></div>
          <div class="bento kpi"><div class="kpi-top"><div><div class="kpi-label">US last 7d</div><div class="kpi-value">${roas(us7.roas)}</div></div>${sparkline(spendSeries,'var(--amber)')}</div><div class="kpi-sub">${czk(us7.spend)} spend / ${czk(us7.revenue)} revenue</div></div>
          <div class="bento kpi"><div class="kpi-top"><div><div class="kpi-label">High priority</div><div class="kpi-value">${high}</div></div>${sparkline([1,2,1,3,2,high||1],'var(--coral)')}</div><div class="kpi-sub">capacity-driving actions</div></div>
          <div class="bento kpi"><div class="kpi-top"><div><div class="kpi-label">Risk flags</div><div class="kpi-value">${risk}</div></div>${sparkline([1,1,2,1,3,risk||1],'var(--violet)')}</div><div class="kpi-sub">outlier and fatigue signals</div></div>
        </section>
        <section class="move-grid">
          ${moves.map((move,index)=>`<article class="bento move-card"><div class="rank">${index+1}</div><div class="move-title">${esc(move.title)}</div><div class="move-meta">${esc(move.change)}<br><br>${esc(move.why)}</div><div class="move-impact">${esc(move.impact)} / ${esc(move.time)}</div></article>`).join('')}
        </section>
      </div>
      <aside class="right-stack">
        ${marketCard('CZSK performance lane',czY,Math.min(99,Math.round(num(czY.roas)*32)))}
        ${marketCard('US discovery lane',us7,Math.min(99,Math.round(num(us7.roas)*52)))}
        ${readinessPanel()}
        ${decisionStack()}
        ${concentrationPanel('czsk')}
      </aside>
    </div>
  </div>`;
}

function renderActions(){
  return `<div class="view active" data-panel="actions"><div class="page-grid">
    ${marketConsole()}
    ${actionBoard()}
    ${decisionStack()}
    ${readinessPanel()}
  </div></div>`;
}

function renderSignals(){
  const winners=(report.winners?.czsk?.adsets||[]).filter(matches);
  const zero=(report.zero_revenue_spend_pockets?.czsk?.ads||[]).filter(matches);
  const losers=[...(report.losers?.czsk?.ads||[]),...(report.losers?.us?.ads||[])].filter(matches);
  const outliers=(report.outlier_radar||[]).filter(matches);
  return `<div class="view active" data-panel="signals"><div class="page-grid">
    <section class="bento table-card wide"><div class="panel-head"><div><div class="section-title">Winners / Scale Lane</div><div class="section-note">Ad sets worth attention before budget moves.</div></div></div><div class="data-row data-head"><div>Name</div><div>Spend</div><div>Revenue</div><div>ROAS</div><div>Purchases</div></div>${winners.slice(0,10).map(entityRow).join('')||'<div class="empty">No winners found.</div>'}</section>
    <section class="bento"><div class="panel-head"><div><div class="section-title">Outlier Radar</div><div class="section-note">Helpful and harmful shifts.</div></div></div><div class="radar-list">${outliers.slice(0,10).map(radarItem).join('')||'<div class="empty">No outliers.</div>'}</div></section>
    ${exceptionPanel()}
    <section class="bento table-card wide"><div class="panel-head"><div><div class="section-title">Losers / Protect Lane</div><div class="section-note">Weak ROAS pockets ranked by spend.</div></div></div><div class="data-row data-head"><div>Name</div><div>Spend</div><div>Revenue</div><div>ROAS</div><div>Purchases</div></div>${losers.slice(0,10).map(entityRow).join('')||'<div class="empty">No loser lane items.</div>'}</section>
    <section class="bento table-card full"><div class="panel-head"><div><div class="section-title">Zero-Revenue Spend Pockets</div><div class="section-note">Cut, justify, or isolate before scaling.</div></div></div><div class="data-row data-head"><div>Name</div><div>Spend</div><div>Revenue</div><div>ROAS</div><div>Purchases</div></div>${zero.slice(0,12).map(entityRow).join('')||'<div class="empty">No zero-revenue spend pockets.</div>'}</section>
  </div></div>`;
}

function renderMarkets(){
  const czY=report.market_reads?.czsk?.yesterday||{};
  const cz7=report.market_reads?.czsk?.last_7d||czY;
  const cz30=report.market_reads?.czsk?.last_30d||cz7;
  const czPrior=report.market_reads?.czsk?.prior_2_day_avg||czY;
  const us7=report.market_reads?.us?.last_7d||{};
  const bars=[
    {label:'30d avg',value:num(cz30.spend)/30},
    {label:'7d avg',value:num(cz7.spend)/7},
    {label:'2d avg',value:num(czPrior.spend)},
    {label:'Yesterday',value:num(czY.spend)}
  ];
  const max=Math.max(...bars.map(bar=>bar.value),1);
  return `<div class="view active" data-panel="markets"><div class="page-grid">
    ${marketConsole()}
    ${marketCard('CZSK yesterday',czY,Math.min(99,Math.round(num(czY.roas)*32)))}
    ${marketCard('CZSK last 7 days',cz7,Math.min(99,Math.round(num(cz7.roas)*32)))}
    ${marketCard('US last 7 days',us7,Math.min(99,Math.round(num(us7.roas)*52)))}
    ${concentrationPanel('czsk')}
    ${concentrationPanel('us')}
    <section class="bento chart-card full"><div class="panel-head"><div><div class="section-title">CZSK Spend Rhythm</div><div class="section-note">Average daily spend windows vs yesterday.</div></div></div><div class="bar-chart">${bars.map(bar=>`<div class="bar-wrap"><div class="bar" style="height:${Math.max(10,Math.round((bar.value/max)*100))}%"></div><div class="bar-label">${esc(bar.label)}<br>${esc(czk(bar.value))}</div></div>`).join('')}</div></section>
  </div></div>`;
}

function renderMemo(){
  const cap=report.capacity||{};
  return `<div class="view active" data-panel="memo"><div class="page-grid">
    <section class="bento memo-card wide"><div class="section-title">Morning Memo</div><div class="section-note">What the operator should read first.</div><div class="memo-text">${esc(report.morning_memo||'No memo available.')}</div></section>
    <section class="bento side-card"><div class="section-title">Capacity Verdict</div><p class="market-sub" style="margin-top:12px">${esc(cap.reason||'No capacity reason available.')}</p><div class="status-strip" style="margin-top:16px"><span class="chip ${pillClass(cap.verdict)}">${esc(cap.verdict||'unknown')}</span><span class="chip light">${esc(report.report_date||'date')}</span></div></section>
    ${actionBoard()}
  </div></div>`;
}

function render(){
  if(!report)return;
  const titles={cockpit:'Decision Cockpit',actions:'Action Board',signals:'Signal Radar',markets:'Market Console',memo:'Morning Memo'};
  viewTitle.textContent=titles[activeView]||'Decision Cockpit';
  navButtons.forEach(btn=>btn.classList.toggle('active',btn.dataset.view===activeView));
  const html={
    cockpit:renderCockpit,
    actions:renderActions,
    signals:renderSignals,
    markets:renderMarkets,
    memo:renderMemo
  }[activeView]();
  app.innerHTML=html;
}

function showError(error){
  app.innerHTML=`<div class="error-box"><div class="section-title">Could not load Media Buyer OS</div><p class="market-sub" style="margin-top:12px">${esc(error.message||error)}</p></div>`;
}

async function loadReport(refresh=false){
  app.innerHTML='<div class="status"><div><div class="loader"></div><strong>Loading decision intelligence...</strong></div></div>';
  try{
    const qs=new URLSearchParams({date_preset:'last_30d'});
    if(refresh)qs.set('refresh','1');
    const response=await fetch(`/api/glv-mb-os/decision-report?${qs}`);
    const payload=await response.json();
    if(!response.ok)throw new Error(payload.error||`HTTP ${response.status}`);
    report=payload;
    render();
  }catch(error){
    showError(error);
  }
}

navButtons.forEach(btn=>btn.addEventListener('click',()=>{
  activeView=btn.dataset.view;
  render();
}));
refreshButton.addEventListener('click',()=>loadReport(true));
searchInput.addEventListener('input',event=>{
  query=event.target.value.trim().toLowerCase();
  render();
});

loadReport();
</script>
</body>
</html>
